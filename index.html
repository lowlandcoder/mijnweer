<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07152b">
  <meta name="description" content="Mijn actuele lokale weer, verzorgd door Open-Meteo.">
  <title>Mijn Weer</title>
  <link rel="stylesheet" href="huisstijl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="weather-app">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Mijn Weer, startpagina"><span class="merk">Mijn<em>Weer</em></span></a>
      <button id="refresh-button" class="icon-button" type="button" aria-label="Weer verversen" title="Weer verversen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6v5h-5M4 18v-5h5M18.5 9A7 7 0 0 0 6.8 6.5L4 9m16 6-2.8 2.5A7 7 0 0 1 5.5 15"/></svg>
      </button>
    </header>

    <section id="status-panel" class="status-panel" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <div><strong id="status-title">Locatie opvragen…</strong><p id="status-message">Geef toestemming wanneer je browser daarom vraagt.</p></div>
      <button id="retry-button" class="button" type="button" hidden>Opnieuw proberen</button>
    </section>

    <div id="weather-content" hidden>
      <section class="hero" aria-labelledby="weather-description">
        <div>
          <p class="eyebrow"><span class="location-dot" aria-hidden="true"></span><span id="location-label">Jouw locatie</span></p>
          <h1><span id="temperature">--</span><span class="degree">°</span></h1>
          <p id="weather-description" class="condition">--</p>
          <p class="feels-like">Voelt als <span id="apparent-temperature">--</span>°C</p>
        </div>
        <div id="weather-icon" class="weather-icon" aria-hidden="true"></div>
      </section>

      <section class="details" aria-label="Weerdetails">
        <article class="detail-card">
          <div class="detail-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 8h10a3 3 0 1 0-3-3M4 12h14a3 3 0 1 1-3 3M4 16h6"/></svg></div>
          <div><p>Wind</p><strong><span id="wind-speed">--</span> km/u</strong><small><span id="wind-direction">--</span> · <span id="beaufort">--</span> Bft</small></div>
        </article>
        <article class="detail-card">
          <div class="detail-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11Z"/><path d="M9 15a3 3 0 0 0 3 3"/></svg></div>
          <div><p>Luchtvochtigheid</p><strong><span id="humidity">--</span>%</strong><small>Relatieve vochtigheid</small></div>
        </article>
        <article class="detail-card">
          <div class="detail-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="m12 12 3-4M6.5 17.5h11"/></svg></div>
          <div><p>Luchtdruk</p><strong><span id="pressure">----</span> hPa</strong><small>Op zeeniveau</small></div>
        </article>
      </section>

      <footer class="update-info">
        <span class="live-dot" aria-hidden="true"></span><span>Laatste update: <time id="last-update">--</time></span>
        <span class="separator" aria-hidden="true">·</span><span>Automatisch elke 5 minuten</span>
      </footer>
    </div>
  </main>
  <noscript>Schakel JavaScript in om het actuele weer te bekijken.</noscript>
  <script src="script.js" defer></script>
</body>
</html>
